name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, prod, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-policy:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Enforce promotion flow
        if: github.event_name == 'pull_request'
        env:
          BASE: ${{ github.base_ref }}
          HEAD: ${{ github.head_ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$HEAD_REPOSITORY" != "$REPOSITORY" ]; then
            echo "Promotion policy requires a same-repository branch" >&2
            exit 1
          fi
          case "$BASE:$HEAD" in
            dev:feat/*|dev:fix/*|dev:docs/*|dev:security/*|prod:dev|main:prod) ;;
            *) echo "Invalid branch flow: $HEAD -> $BASE" >&2; exit 1 ;;
          esac

  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: ./scripts/check.sh

  msrv:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Verify minimum supported Rust version
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          cargo +1.85.0 test --workspace --locked
