name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, prod, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-policy:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Enforce promotion flow
        if: github.event_name == 'pull_request'
        env:
          BASE: ${{ github.base_ref }}
          HEAD: ${{ github.head_ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$HEAD_REPOSITORY" != "$REPOSITORY" ]; then
            echo "Promotion policy requires a same-repository branch" >&2
            exit 1
          fi
          case "$BASE:$HEAD" in
            dev:feat/*|dev:fix/*|dev:docs/*|dev:security/*|dev:dependabot/*|prod:dev|main:prod) ;;
            *) echo "Invalid branch flow: $HEAD -> $BASE" >&2; exit 1 ;;
          esac

  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt
          rustup target add --toolchain 1.97.1 x86_64-unknown-none x86_64-unknown-uefi
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: ./scripts/check.sh

  msrv:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Verify minimum supported Rust version
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup target add --toolchain 1.85.0 x86_64-unknown-none x86_64-unknown-uefi
          cargo +1.85.0 test --workspace --locked
          cargo +1.85.0 build --locked --profile boot \
            --target x86_64-unknown-uefi \
            --package polytope-boot-uefi --features uefi-binary
          cargo +1.85.0 build --locked --profile boot \
            --target x86_64-unknown-none \
            --package polytope-kernel --features boot-binary

  boot-reference:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: quality
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain and targets
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt
          rustup target add --toolchain 1.97.1 x86_64-unknown-none x86_64-unknown-uefi
      - name: Install QEMU reference emulator
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends qemu-system-x86
      - name: Build and verify the x86_64 reference boot path
        run: ./scripts/boot-check.sh
      - name: Publish bounded boot evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sprint-02-boot-evidence
          path: target/polytope/evidence/*.json
          if-no-files-found: error
          retention-days: 14
